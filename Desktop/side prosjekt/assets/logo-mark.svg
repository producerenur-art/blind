<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="SoundCore">
  <defs>
    <linearGradient id="scSound" x1="6" y1="10" x2="58" y2="54" gradientUnits="userSpaceOnUse">
      <stop stop-color="#a78bfa"/>
      <stop offset="0.5" stop-color="#818cf8"/>
      <stop offset="1" stop-color="#c084fc"/>
    </linearGradient>
    <linearGradient id="scCore" x1="24" y1="24" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#f472b6"/>
    </linearGradient>
    <radialGradient id="scGlow" cx="0.5" cy="0.5" r="0.5">
      <stop stop-color="#f472b6" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#f472b6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- glow bak kjernen -->
  <circle cx="32" cy="32" r="20" fill="url(#scGlow)"/>

  <!-- ytre lydbølge-ringer (venstre + høyre buer) -->
  <g stroke="url(#scSound)" stroke-linecap="round" fill="none">
    <path d="M19 20 A 16 16 0 0 0 19 44" stroke-width="3" opacity="0.9"/>
    <path d="M45 20 A 16 16 0 0 1 45 44" stroke-width="3" opacity="0.9"/>
    <path d="M13 14 A 24 24 0 0 0 13 50" stroke-width="2.5" opacity="0.45"/>
    <path d="M51 14 A 24 24 0 0 1 51 50" stroke-width="2.5" opacity="0.45"/>
  </g>

  <!-- equalizer-puls gjennom kjernen -->
  <g stroke="url(#scSound)" stroke-linecap="round" stroke-width="3.4">
    <line x1="24" y1="30" x2="24" y2="34"/>
    <line x1="28.5" y1="24" x2="28.5" y2="40"/>
    <line x1="35.5" y1="20" x2="35.5" y2="44"/>
    <line x1="40" y1="27" x2="40" y2="37"/>
  </g>

  <!-- kjernen ("core") -->
  <circle cx="32" cy="32" r="6.2" fill="url(#scCore)"/>
  <circle cx="32" cy="32" r="6.2" fill="none" stroke="#fff" stroke-opacity="0.25" stroke-width="1"/>
</svg>
