<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a0f">
  <title>Sound Core</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;700&family=Playfair+Display:wght@400;700&family=Rajdhani:wght@400;600;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <!-- Gun.js — decentralized real-time chat (no server needed) -->
  <script src="https://cdn.jsdelivr.net/npm/gun/gun.min.js"></script>
  <!-- QR Code generator -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ═══ PSYCHEDELIC BACKGROUND LAYER ═══ -->
  <div id="bg-layer">
    <!-- Nebula orbs — always-on procedural depth layer -->
    <div id="bg-nebula-a"></div>
    <div id="bg-nebula-b"></div>
    <div id="bg-nebula-c"></div>
    <div id="bg-nebula-d"></div>
    <div id="bg-nebula-e"></div>
    <!-- User image sits on top of nebula -->
    <div id="bg-img-wrap">
      <img id="bg-img" alt="" draggable="false">
    </div>
    <div id="bg-prism-1"></div>
    <div id="bg-prism-2"></div>
    <div id="bg-prism-3"></div>
    <canvas id="bg-particles-canvas"></canvas>
    <div id="bg-vignette"></div>
  </div>

  <!-- Background change button (always visible) -->
  <button id="bg-change-btn" title="Bytt bakgrunn" onclick="BgManager.openPicker()">🖼️</button>
  <input type="file" id="bg-file-input" accept="image/*" style="display:none" onchange="BgManager.uploadImage(this)">

  <!-- ═══ PERSISTENT NAV ═══ -->
  <nav id="main-nav">
    <a class="nav-logo" id="nav-logo-link" href="#/">Sound<span>Core</span></a>
    <div class="nav-center" id="nav-search-wrap">
      <div class="search-box">
        <span class="search-icon">⌕</span>
        <input type="text" id="nav-search" placeholder="Søk brukere…" autocomplete="off">
        <div id="search-results" class="search-dropdown hidden"></div>
      </div>
    </div>
    <div class="nav-right" id="nav-links"></div>
  </nav>

  <!-- ═══ MAIN CONTENT (routes render here) ═══ -->
  <main id="app"></main>

  <!-- ═══ TOAST NOTIFICATIONS ═══ -->
  <div id="toast-container"></div>

  <!-- ═══ MODAL OVERLAY ═══ -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div id="modal-box" class="modal-box"></div>
  </div>

  <!-- ═══ PERSISTENT MUSIC PLAYER (never unmounts) ═══ -->
  <div id="player-bar" class="player-bar hidden">
    <div class="player-left" id="player-left">
      <div class="player-artwork" id="player-artwork">
        <span class="artwork-note">♪</span>
      </div>
      <div class="player-meta">
        <div class="player-title" id="player-title">Ingen sang valgt</div>
        <div class="player-artist" id="player-artist">—</div>
      </div>
    </div>

    <div class="player-center">
      <div class="player-controls">
        <button class="ctrl-btn" id="ctrl-shuffle" title="Bland">⇄</button>
        <button class="ctrl-btn" id="ctrl-prev" title="Forrige">⏮</button>
        <button class="ctrl-btn ctrl-play" id="ctrl-play" title="Spill av">▶</button>
        <button class="ctrl-btn" id="ctrl-next" title="Neste">⏭</button>
        <button class="ctrl-btn" id="ctrl-repeat" title="Repeter">↻</button>
      </div>
      <div class="player-progress-row">
        <span id="time-current">0:00</span>
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill"></div>
          <input type="range" id="progress-bar" value="0" min="0" max="100" step="0.1">
        </div>
        <span id="time-total">0:00</span>
      </div>
    </div>

    <div class="player-right">
      <button class="ctrl-btn" id="ctrl-queue" title="Køen">☰</button>
      <span class="vol-icon">🔊</span>
      <div class="progress-track vol-track">
        <div class="progress-fill" id="vol-fill" style="width:80%"></div>
        <input type="range" id="volume-bar" value="80" min="0" max="100">
      </div>
    </div>

    <!-- Queue panel -->
    <div id="queue-panel" class="queue-panel hidden">
      <div class="queue-header">
        <h3>Spilleliste</h3>
        <button onclick="document.getElementById('queue-panel').classList.add('hidden')" class="btn-icon">✕</button>
      </div>
      <div id="queue-list"></div>
    </div>
  </div>

  <!-- Hidden audio engine -->
  <audio id="audio-engine" preload="metadata" crossorigin="anonymous"></audio>

  <!-- ═══ EMBED MEDIA PANEL ═══ -->
  <div id="embed-panel" class="embed-panel hidden">
    <div class="embed-panel-hdr">
      <span id="embed-panel-title"></span>
      <button class="embed-panel-close" onclick="closeEmbedPanel()">✕</button>
    </div>
    <iframe id="embed-panel-frame" src="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" allowfullscreen></iframe>
  </div>

  <!-- ═══ PLATFORM SWITCHER ═══ -->
  <div id="platform-widget">
    <button id="platform-toggle" title="Open on another platform">
      <span id="platform-icon">📲</span>
      <span id="platform-label">Platform</span>
      <span id="platform-chevron">▲</span>
    </button>
    <div id="platform-panel">
      <div class="platform-title">Open on</div>
      <a class="platform-item" id="platform-mobile" href="#" target="_blank" rel="noopener">
        <span class="platform-emoji">📱</span>
        <div class="platform-info">
          <span class="platform-name">Smartphone</span>
          <span class="platform-desc">Mobile version</span>
        </div>
        <span class="platform-arrow">↗</span>
      </a>
      <a class="platform-item" id="platform-desktop" href="#" target="_blank" rel="noopener">
        <span class="platform-emoji">💻</span>
        <div class="platform-info">
          <span class="platform-name">Mac / Laptop</span>
          <span class="platform-desc">Desktop version</span>
        </div>
        <span class="platform-arrow">↗</span>
      </a>
      <a class="platform-item" id="platform-appstore" href="#" target="_blank" rel="noopener">
        <span class="platform-emoji">🏪</span>
        <div class="platform-info">
          <span class="platform-name">App Store</span>
          <span class="platform-desc">iOS & Mac App</span>
        </div>
        <span class="platform-arrow">↗</span>
      </a>
    </div>
  </div>

  <!-- ═══ LANGUAGE PICKER ═══ -->
  <div id="lang-widget">
    <button id="lang-toggle" title="Choose language">
      <span id="lang-globe">🌐</span>
      <span id="lang-current-label">Language</span>
      <span id="lang-chevron">▲</span>
    </button>
    <div id="lang-panel">
      <div id="lang-search-wrap">
        <input id="lang-search" type="text" placeholder="Search language..." autocomplete="off" spellcheck="false">
      </div>
      <ul id="lang-list"></ul>
    </div>
  </div>

  <!-- Hidden Google Translate element -->
  <div id="google_translate_element" style="display:none"></div>

  <!-- ═══ SCRIPTS ═══ -->
  <script src="js/config.js"></script>
  <script src="js/payment.js"></script>
  <script src="js/background.js"></script>
  <script src="js/db.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/email.js"></script>
  <script src="js/ai.js"></script>
  <script src="js/player.js"></script>
  <script src="js/profile.js"></script>
  <script src="js/radio.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/discover.js"></script>
  <script src="js/underground.js"></script>
  <script src="js/shows.js"></script>
  <script src="js/dj.js"></script>
  <script src="js/studio.js"></script>
  <script src="js/router.js"></script>
  <script src="js/app.js"></script>
  <script src="js/platform.js"></script>
  <script src="js/lang.js"></script>
  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement(
        { pageLanguage: 'no', autoDisplay: false },
        'google_translate_element'
      );
    }
  </script>
  <script src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>
</body>
</html>
